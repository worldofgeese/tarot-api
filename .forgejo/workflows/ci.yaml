name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Seed database
        run: bun run seed

      - name: Run tests
        run: bun run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build container image
        run: |
          podman build -t tarot-api:latest -f Containerfile .

      - name: Test container
        run: |
          podman run -d --name tarot-test -p 3000:3000 tarot-api:latest
          sleep 5
          curl -f http://localhost:3000/api/cards || exit 1
          podman stop tarot-test
          podman rm tarot-test
